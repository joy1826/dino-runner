<!DOCTYPE html>
<html>
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Final Dino Runner</title>
<style>
 #startScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.8);
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    z-index: 999;
}

 #startBtn{
    display:block !important;
    margin-top:20px;
    padding:15px 30px;
    font-size:24px;
    background:white;
    color:black;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
 #startRules{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
    max-width:300px;
}
 #restart{
    display:none;
}
body{font-family:Arial;text-align:center;background:#f5f5f5}

#game {
    width:95vw;
    max-width:900px;
    height:320px;
    margin:20px auto;
    position:relative;
    overflow:hidden;
    border:3px solid #000;
    background:linear-gradient(
        to bottom,
        #87CEEB 0%,
        #87CEEB 75%,
        #E8C27D 75%,
        #E8C27D 100%
    );
}
background:linear-gradient(to bottom,#87CEEB 0%,#87CEEB 75%,#E8C27D 75%,#E8C27D 100%);}
#sun{position:absolute;top:15px;right:30px;font-size:48px}
.dune{position:absolute;bottom:0;background:#D9B56D;border-radius:50%}
#d1{width:220px;height:60px;left:80px} #d2{width:260px;height:80px;left:500px}
#ground{position:absolute;bottom:0;height:5px;width:100%;background:#654321}
#dino{position:absolute;left:60px;bottom:5px;font-size:52px;transform:scaleX(-1)}
.cactus{position:absolute;bottom:5px;font-size:48px}
#message{font-size:28px;font-weight:bold;min-height:40px}
#oops{font-size:24px;color:red;height:30px}
button{padding:10px 20px;font-size:18px;}
#moon{
    position:absolute;
    top:260px;
    left:40px;
    font-size:42px;
}

.eagle{
    position:absolute;
    font-size:40px;
    top:100px;
    left:1200px;
}
#warning {
    font-size: 24px;
    color: orange;
    font-weight: bold;
    height: 30px;
}
 warning.style.color = "yellow";
warning.style.fontSize = "30px";
</style>
</head>
<body>

<h1>🦖 Final Dino Runner</h1>

<div id="startScreen">
    <h1>🦖 Dino Runner</h1>

    <div id="startRules">
        <h3>Rules</h3>
        <p>Space/↑ = Jump</p>
        <p>Double Jump Allowed</p>
        <p>Avoid Cacti 🌵</p>
        <p>3 Lives ❤️</p>
    </div>

    <button id="startBtn">▶ Tap to Start</button>
</div>
<div id="score">Score: 0</div>
<div id="best">Best Score: 0</div>
<div id="lives">Lives: 3</div>
<div id="jumps">Jumps Left: 2</div>
<div id="message"></div>
 <div id="warning"></div>
<div id="oops"></div>
<button id="restart">🔄 Try Again</button>

<div id="game">
<div id="sun">☀️</div>
<div id="moon">🌙</div>
<div id="d1" class="dune"></div>
<div id="d2" class="dune"></div>
<div id="dino">🦖</div>
<div class="cactus">🌵</div>
<div class="cactus">🌵</div>
<div class="cactus">🌵</div>
<div class="eagle">🦅</div>
<div class="eagle">🦅</div>
<div id="ground"></div>
</div>

<script>
const dino = document.getElementById("dino");
const cacti = document.querySelectorAll(".cactus");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const livesEl = document.getElementById("lives");
const jumpsEl = document.getElementById("jumps");

const msg = document.getElementById("message");
const oops = document.getElementById("oops");

const restart = document.getElementById("restart");

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const warning = document.getElementById("warning");
let gameStarted = false;
let gameOver = false;

let score = 0;
let lives = 3;

let cactusSpeed = 7;
let positions = [900, 1200, 1500];

let jumpCount = 0;
let velocity = 0;
let dinoY = 5;

let invincible = false;
let cactusPaused = false;
let isNight = false;

let sunY = 15;
let moonY = 260;

let eaglePositions = [1300,1700];

const sun = document.getElementById("sun");
const moon = document.getElementById("moon");

const eagles = document.querySelectorAll(".eagle");

let best = Number(localStorage.getItem("bestScore")) || 0;
bestEl.textContent = "Best Score: " + best;


/* ---------- SOUND ---------- */

const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

let musicStarted = false;

function note(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    osc.type = "triangle";
    gain.gain.value = 0.02;

    osc.start();

    setTimeout(() => {
        osc.stop();
    }, duration);
}

function startMusic() {
    if (musicStarted) return;

    musicStarted = true;

    const melody = [262, 330, 392, 523];

    setInterval(() => {
        note(
            melody[Math.floor(Math.random() * melody.length)],
            180
        );
    }, 700);
}


/* ---------- START BUTTON ---------- */

function startGame() {
    gameStarted = true;
    startScreen.style.display = "none";

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    startMusic();
}

startBtn.addEventListener("click", startGame);

startBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startGame();
});
/* ---------- JUMP ---------- */

function jump() {
    if (!gameStarted) return;
    if (gameOver) return;

   if(isNight){
    velocity = 11;
}
else{
    if(jumpCount < 2){
        velocity = 11;
        jumpCount++;
    }
}
}

document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        jump();
    }
});

const game = document.getElementById("game");

game.addEventListener(
    "touchstart",
    (e) => {
        if (gameStarted && !gameOver) {
            e.preventDefault();
            jump();
        }
    },
    { passive: false }
);
    
    
  

/* ---------- RESTART ---------- */

restart.onclick = () => {
    score = 0;
    lives = 3;
    gameOver = false;
eaglePositions = [1300, 1700];
 for (let i = 0; i < eagles.length; i++) {
    eagles[i].style.left = eaglePositions[i] + "px";
}
    cactusSpeed = 7;
    positions = [900, 1200, 1500];
gameStarted = true;
gameOver = false;
isNight = false;
    jumpCount = 0;
    velocity = 0;
    dinoY = 5;

    invincible = false;
    cactusPaused = false;

    scoreEl.textContent = "Score: 0";
    livesEl.textContent = "Lives: 3";
    jumpsEl.textContent = "Jumps Left: 2";

    msg.textContent = "";
    oops.textContent = "";

    restart.style.display = "none";
};
/* ---------- GAME LOOP ---------- */

setInterval(() => {

    if (!gameStarted) return;
    if (gameOver) return;
const cycle = Math.floor(score / 20);
let newNight = (cycle % 2 === 1);

if (newNight && !isNight) {

    warning.textContent = "⚠️ Night is coming!";

    setTimeout(() => {
        warning.textContent = "";
    }, 1000);

    invincible = true;

    setTimeout(() => {
        invincible = false;
    }, 1000);
}

isNight = newNight;

if (isNight) {

    document.getElementById("game").style.background =
        "linear-gradient(to bottom,#081C3A 0%,#081C3A 75%,#333333 75%,#333333 100%)";

    sun.style.display = "none";
    moon.style.display = "block";

    if (sunY < 260) sunY += 1;
    if (moonY > 20) moonY -= 1;

} else {

    document.getElementById("game").style.background =
        "linear-gradient(to bottom,#87CEEB 0%,#87CEEB 75%,#E8C27D 75%,#E8C27D 100%)";

    sun.style.display = "block";
    moon.style.display = "none";

    if (sunY > 15) sunY -= 1;
    if (moonY < 260) moonY += 1;
}
 for(let i=0;i<eagles.length;i++){

    if(isNight){

        eaglePositions[i] -= cactusSpeed + 3;

        eagles[i].style.left =
            eaglePositions[i] + "px";

        if(eaglePositions[i] < -100){
            eaglePositions[i] =
                1200 + Math.random()*600;
        }

        if(
            eaglePositions[i] > 40 &&
            eaglePositions[i] < 110 &&
            dinoY > 60 &&
            !invincible
        ){

            lives--;

            livesEl.textContent =
                "Lives: " + lives;

            invincible = true;

            setTimeout(()=>{
                invincible = false;
            },1000);

            if(lives <= 0){

                msg.textContent =
                    "😢 Eagles got you!";

                restart.style.display =
                    "inline-block";

                gameOver = true;
            }
        }

    }
}

sun.style.top = sunY + "px";
moon.style.top = moonY + "px";
    velocity -= 0.7;
    dinoY += velocity;

    if (dinoY < 5) {
        dinoY = 5;
        velocity = 0;
        jumpCount = 0;
    }

    dino.style.bottom = dinoY + "px";

    if(isNight){
    jumpsEl.textContent =
        "🚀 Unlimited Air Jumps Mode";
}else{
    jumpsEl.textContent =
        "Jumps Left: " + (2 - jumpCount);
}

    for (let i = 0; i < cacti.length; i++) {

        if (!cactusPaused) {
            positions[i] -= cactusSpeed;
        }

        cacti[i].style.left = positions[i] + "px";

        if (positions[i] < -60) {

            positions[i] = 900 + Math.random() * 500;

            score++;

            scoreEl.textContent =
                "Score: " + score;

            if (score > best) {
                best = score;

                localStorage.setItem(
                    "bestScore",
                    best
                );

                bestEl.textContent =
                    "Best Score: " + best;
            }

            if (score % 3 === 0) {
                cactusSpeed += 1;
            }
        }
let cactusHitHeight = isNight ? 75 : 60;

if (
    positions[i] > 30 &&
    positions[i] < 95 &&
    dinoY < cactusHitHeight &&
    !invincible
)
       
        {

            lives--;

            livesEl.textContent =
                "Lives: " + lives;

            oops.textContent = "😵 Oops!";

            setTimeout(() => {
                oops.textContent = "";
            }, 800);

            invincible = true;
            cactusPaused = true;

            setTimeout(() => {
                cactusPaused = false;
            }, 500);

            setTimeout(() => {
                invincible = false;
            }, 1000);

            if (lives <= 0) {

                msg.textContent =
                    "😢 Oh no! You lost!";

                restart.style.display =
                    "inline-block";

                gameOver = true;
            }

            break;
        }
    }

}, 20);
</script>
</body>
</html>
