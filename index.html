<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dino Runner Desert Adventure</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
}

#rules {
    position: fixed;
    top: 10px;
    right: 10px;
    background: white;
    border: 2px solid black;
    padding: 10px;
    text-align: left;
    font-size: 14px;
    border-radius: 10px;
}

#score, #lives {
    font-size: 24px;
    margin: 5px;
}

#message {
    font-size: 32px;
    font-weight: bold;
    min-height: 50px;
}

#oops {
    font-size: 28px;
    font-weight: bold;
    color: red;
    height: 40px;
}

#restartBtn {
    display: none;
    padding: 10px 20px;
    font-size: 20px;
    cursor: pointer;
}

#game {
    width: 800px;
    height: 300px;
    margin: 20px auto;
    border: 3px solid black;
    position: relative;
    overflow: hidden;
    background: linear-gradient(
        to bottom,
        #87CEEB 0%,
        #87CEEB 75%,
        #E8C27D 75%,
        #E8C27D 100%
    );
}

#sun {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 50px;
}

#dune1, #dune2 {
    position: absolute;
    bottom: 0;
    background: #D9B56D;
    border-radius: 50%;
}

#dune1 {
    width: 220px;
    height: 60px;
    left: 80px;
}

#dune2 {
    width: 260px;
    height: 80px;
    left: 500px;
}

#ground {
    width: 100%;
    height: 5px;
    background: #654321;
    position: absolute;
    bottom: 0;
}

#dino {
    position: absolute;
    left: 40px;
    bottom: 5px;
    font-size: 50px;
    user-select: none;
    transform: scaleX(-1);
}

#cactus {
    position: absolute;
    left: 800px;
    bottom: 5px;
    font-size: 50px;
    user-select: none;
}
</style>
</head>

<body>

<div id="rules">
<b>📋 Rules</b><br>
• Press SPACE or ↑ to jump<br>
• Avoid the cactus 🌵<br>
• You have 3 lives ❤️<br>
• The cactus gets faster! ⚡
</div>

<h1>🦖 Dino Runner Desert Adventure</h1>

<div id="score">Score: 0</div>
<div id="lives">Lives: 3</div>

<div id="message"></div>
<div id="oops"></div>

<button id="restartBtn">🔄 Try Again</button>

<div id="game">

    <div id="sun">☀️</div>

    <div id="dune1"></div>
    <div id="dune2"></div>

    <div id="dino">🦖</div>
    <div id="cactus">🌵</div>

    <div id="ground"></div>

</div>

<p>Press SPACE or ↑ Arrow to jump!</p>

<script>
const dino = document.getElementById("dino");
const cactus = document.getElementById("cactus");
const scoreText = document.getElementById("score");
const livesText = document.getElementById("lives");
const message = document.getElementById("message");
const oops = document.getElementById("oops");
const restartBtn = document.getElementById("restartBtn");

let score = 0;
let lives = 3;
let cactusX = 800;
let cactusSpeed = 7;
let jumping = false;
let invincible = false;
let cactusPaused = false;
let gameOver = false;

/* Music */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    osc.type = "triangle";
    gain.gain.value = 0.03;

    osc.start();

    setTimeout(() => {
        osc.stop();
    }, duration);
}

let musicStarted = false;

function startMusic() {
    if (musicStarted) return;

    musicStarted = true;

    setInterval(() => {
        playNote(262, 180);
        setTimeout(() => playNote(330, 180), 250);
        setTimeout(() => playNote(392, 180), 500);
    }, 1000);
}

// Jump
function jump() {
    if (jumping || gameOver) return;

    startMusic();

    jumping = true;
    let height = 5;

    const up = setInterval(() => {
        height += 6;
        dino.style.bottom = height + "px";

        if (height >= 140) {
            clearInterval(up);

            const down = setInterval(() => {
                height -= 6;
                dino.style.bottom = height + "px";

                if (height <= 5) {
                    dino.style.bottom = "5px";
                    clearInterval(down);
                    jumping = false;
                }
            }, 20);
        }
    }, 20);
}

// Controls
document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        jump();
    }
});

// Restart
restartBtn.addEventListener("click", () => {
    score = 0;
    lives = 3;
    cactusX = 800;
    cactusSpeed = 7;
    gameOver = false;
    invincible = false;
    cactusPaused = false;

    scoreText.textContent = "Score: 0";
    livesText.textContent = "Lives: 3";
    message.textContent = "";
    oops.textContent = "";

    restartBtn.style.display = "none";
});

// Main Game Loop
setInterval(() => {

    if (gameOver) return;

    if (!cactusPaused) {
        cactusX -= cactusSpeed;
    }

    cactus.style.left = cactusX + "px";

    // Score
    if (cactusX < -60) {
        cactusX = 800;

        score++;
        scoreText.textContent = "Score: " + score;

        // Speed up every 3 points
        if (score % 3 === 0) {
            cactusSpeed += 1;
        }
    }

    const dinoBottom =
        parseInt(window.getComputedStyle(dino).bottom);

    // Collision
    if (
        cactusX > 20 &&
        cactusX < 90 &&
        dinoBottom < 55 &&
        !invincible
    ) {
        lives--;
        livesText.textContent = "Lives: " + lives;

        oops.textContent = "😵 Oops!";

        setTimeout(() => {
            oops.textContent = "";
        }, 1000);

        invincible = true;
        cactusPaused = true;

        setTimeout(() => {
            cactusPaused = false;
        }, 500);

        setTimeout(() => {
            invincible = false;
        }, 1000);

        if (lives <= 0) {
            message.textContent = "😢 Oh no! You lost!";
            restartBtn.style.display = "inline-block";
            gameOver = true;
        }
    }

}, 20);
</script>

</body>
</html>
